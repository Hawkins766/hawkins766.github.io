<style>
* {
  box-sizing: border-box;
}
body {

/* 头部标题 */
.header {
    background-color:#232122;  /*背景色*/
    color:rgb(249, 249, 249);     /*文字颜色*/
    text-align:center;   /*文字居中*/
    padding:10px;  /*内边距*/
    border:0px solid #f1f1f1;  /*边框*/
    border-radius: 0px;  /*圆角边框*/
    font-family: "Microsoft YaHei", "Arial Narrow", sans-serif; /*字体*/
    box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
}

/* 导航条 */
.topnav {
  overflow: hidden;
  background-color: #232122;
  border-radius: 5px;
  border:0px solid #f1f1f1; /*边框*/
  margin-top:40px; /*外边距*/
  transition: 3s;
  margin-left:400px; /*左边距*/
  margin-right:180px; /*右边距*/
  margin-bottom:20px; /*下边距*/
}
 
/* 导航条链接 */
.topnav a {
  float: left;
  display: block;
  color: #c0c0c0;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  border-radius: 0px;
  font-weight:bold; /*加粗字体*/
  font-family: "Microsoft YaHei", "Arial Narrow", sans-serif; /*字体*/
  transition-duration: 0.4s;
  
}
/* 链接颜色修改 */
.topnav a:hover {
  background-color: #555555;
  color: rgb(227, 227, 227);
}

/* 创建两列 */
.leftcolumn {   
  float: left;
  width: 75%;
}

/* 右侧栏 */
.rightcolumn {
  float: left;
  width: 25%;
  background-color: #161513;
  padding-left: 20px;
  border-radius: 5px;  /*圆角边框*/
  font-family: "Microsoft YaHei", "Arial Narrow", sans-serif; /*字体*/
}

/* 图像部分 */

/* 文章卡片效果 */
.card_0 {

  padding: 25px;
  margin-top: 20px;
  border-radius: 5px;  /*圆角边框*/

  margin-right:20px; /*右边距*/
}
.card_1 {

  margin-top: 20px;
  border-radius: 5px;  /*圆角边框*/
  margin-left:10px; /*左边距*/
  margin-right:180px; /*右边距*/
}
/* 列后面清除浮动 */
.row:after {
  content: "";
  display: table;
  clear: both;
}

/*页尾*/
.footer {
    background-color:#232122;  /*背景色*/
    color:white;    /*文字颜色*/
    clear:both;
    text-align:center;   /*文字居中*/
    padding:6px;  /*内边距*/
    border:0px solid #f1f1f1; /*边框*/
    margin-top:15px; /*外边距*/
    border-radius: 0px;  /*圆角边框*/
    font-family: "Microsoft YaHei", "Arial Narrow", sans-serif; /*字体*/
    font-weight:lighter; /*细字体*/
    box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
    text-shadow: 2px 2px 5px #336666;
}

/* 响应式布局 - 屏幕尺寸小于 800px 时，两列布局改为上下布局 */
@media screen and (max-width: 800px) {
  .leftcolumn, .rightcolumn {   
    width: 100%;
    padding: 0;
  }
}
 
/* 响应式布局 -屏幕尺寸小于 400px 时，导航等布局改为上下布局 */
@media screen and (max-width: 400px) {
  .topnav a {
    float: none;
    width: 100%;
  }
}

/* 未访问链接*/
.card_0 :link {

}
/* 已访问链接 */
.card_0 a:visited {
    color:#000000;
    text-decoration:none; /*隐藏下划线*/
}
/* 鼠标移动到链接上 */
.card_0 a:hover {
    color:#336666;
    text-decoration:none; /*隐藏下划线*/
    font-size:100%;   /*触碰时改变字体大小*/
}
/* 鼠标点击时 */
.card_0 a:active {
    color:#336666;

/*注意： a:hover 必须在 a:link 和 a:visited 之后，需要严格按顺序才能看到效果*/
