<!DOCTYPE html>

<head>

<style>
* {
  box-sizing: border-box;
}
body {
  font-family: Arial;
  padding: 10px;
  background: #f1f1f1;
}
/* 头部标题 */
.header {
    background-color:#336666;  /*背景色*/
    color:white;     /*文字颜色*/
    text-align:center;   /*文字居中*/
    padding:10px;  /*内边距*/
    border:0px solid #f1f1f1;  /*边框*/
    border-radius: 5px;  /*圆角边框*/
    font-family: "Microsoft YaHei", "Arial Narrow", sans-serif; /*字体*/
}

/* 导航条 */
.topnav {
  overflow: hidden;
  background-color: #669999;
  border-radius: 5px;
  border:0px solid #f1f1f1; /*边框*/
  margin-top:1px; /*外边距*/
  transition: 3s;
}
 
/* 导航条链接 */
.topnav a {
  float: left;
  display: block;
  color: #ffffff;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  border-radius: 5px;
  font-weight:bold; /*加粗字体*/
  font-family: "Microsoft YaHei", "Arial Narrow", sans-serif; /*字体*/
  
}
/* 链接颜色修改 */
.topnav a:hover {
  background-color: #336666;
  color: rgb(255, 255, 255);
}

/* 创建两列 */
/* Left column */
.leftcolumn {   
  float: left;
  width: 75%;
}

/* 右侧栏 */
.rightcolumn {
  float: left;
  width: 25%;
  background-color: #f1f1f1;
  padding-left: 20px;
  border-radius: 5px;  /*圆角边框*/
  font-family: "Microsoft YaHei", "Arial Narrow", sans-serif; /*字体*/
}

/* 图像部分 */
.fakeimg {
  background-color: #aaa;
  width: 100%;
  padding: 20px;
  border-radius: 5px;  /*圆角边框*/
}
#img_0 {
    padding: 0px;
    border-radius: 5px;  /*圆角边框*/
}
#img_1 {
    padding: 0px;
    border-radius: 5px;  /*圆角边框*/
}

/* 文章卡片效果 */
.card {
  background-color: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 5px;  /*圆角边框*/
}

/* 列后面清除浮动 */
.row:after {
  content: "";
  display: table;
  clear: both;
}

/*页尾*/
.footer {
    background-color:#336666;  /*背景色*/
    color:white;    /*文字颜色*/
    clear:both;
    text-align:center;   /*文字居中*/
    padding:6px;  /*内边距*/
    border:0px solid #f1f1f1; /*边框*/
    margin-top:15px; /*外边距*/
    border-radius: 5px;  /*圆角边框*/
    font-family: "Microsoft YaHei", "Arial Narrow", sans-serif; /*字体*/
    font-weight:lighter; /*细字体*/
}

/* 响应式布局 - 屏幕尺寸小于 800px 时，两列布局改为上下布局 */
@media screen and (max-width: 800px) {
  .leftcolumn, .rightcolumn {   
    width: 100%;
    padding: 0;
  }
}
 
/* 响应式布局 -屏幕尺寸小于 400px 时，导航等布局改为上下布局 */
@media screen and (max-width: 400px) {
  .topnav a {
    float: none;
    width: 100%;
  }
}

/* 未访问链接*/
a:link {
    color:#ffffff;
    text-decoration:none;
}
/* 已访问链接 */
a:visited {
    color:#ffffff;
    text-decoration:none;
}
/* 鼠标移动到链接上 */
a:hover {
    color:#336666;
    text-decoration:none;
    font-size:100%;   /*触碰时改变字体大小*/
}
/* 鼠标点击时 */
a:active {
    color:#336666;
    text-decoration:none;
}
/*注意： a:hover 必须在 a:link 和 a:visited 之后，需要严格按顺序才能看到效果*/
/*注意： a:active 必须在 a:hover 之后。*/



</style>
</head>
