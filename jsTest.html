<!DOCTYPE html>
<html>
<body>

<h2>Body 中的 JavaScript</h2>

<p id="demo0"></p>
<script>
var Pi = 3.14;
var radius = 5;
var diameter = radius + radius;
var area = Pi * ((diameter/2) ** 2);
document.getElementById("demo0").innerHTML =
"因为圆的半径是" + radius + "厘米，"+
"所以圆的的面积是" + area + "平方厘米。";  

</script>

</body>
</html>
